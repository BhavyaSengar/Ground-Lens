<!DOCTYPE html>

    <script type="importmap">
      {
        "imports": {
          "motion": "https://esm.sh/motion@11"

      }

    <!-- Firebase SDKs — Full modules -->

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import {
            getAuth, GoogleAuthProvider, signInWithPopup,
            signInWithEmailAndPassword, createUserWithEmailAndPassword,

        } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import {
            getFirestore, doc, setDoc, getDoc, addDoc, getDocs,
            collection, query, where, orderBy, serverTimestamp, updateDoc, increment, onSnapshot
        } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        window.firebaseModules = {
            initializeApp, getAuth, getFirestore, GoogleAuthProvider,
            signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword,
            updateProfile, onAuthStateChanged, signOut,
            doc, setDoc, updateDoc, getDoc, addDoc, getDocs,
            collection, query, where, orderBy, serverTimestamp, increment, onSnapshot 
        };
    </script>

</head>

            </div>

    <!-- Templates -->

                                </div>
                            </li>

    <script>
        window.switchDoerTab = function(tabName) {
            const tabAvail = document.getElementById('tab-available');
            const tabHist = document.getElementById('tab-history');
            const listAvail = document.getElementById('list-available');
            const listHist = document.getElementById('list-history');
            const badge = document.getElementById('doer-tab-badge');

            // Safety check in case the DOM hasn't loaded
            if(!tabAvail) return;

            if (tabName === 'available') {
                tabAvail.style.borderBottom = '2px solid var(--brand-purple)';
                tabAvail.style.color = 'var(--text-main)';
                tabHist.style.borderBottom = '2px solid transparent';
                tabHist.style.color = 'var(--text-muted)';
                
                listAvail.style.display = 'flex';
                listHist.style.display = 'none';
                
                badge.innerText = '3 Nearby';

                badge.style.color = '#c084fc';
                badge.style.borderColor = 'rgba(168, 85, 247, 0.3)';

                tabHist.style.borderBottom = '2px solid var(--brand-cyan)';
                tabHist.style.color = 'var(--text-main)';

                badge.style.borderColor = 'rgba(6, 182, 212, 0.3)';
            }

    <script>
    window.checkAdminPin = function() {
        const pin = document.getElementById('admin-pin')?.value;
        if (pin === 'GL2025') {
            document.getElementById('admin-gate').style.display = 'none';
            document.getElementById('admin-real-content').style.display = 'block';
            if(window.loadAdminData) window.loadAdminData(); 
        } else {
            alert('Incorrect PIN');
        }
    };

    window.submitWaitlist = async function() {
        const email = document.getElementById('waitlist-email')?.value?.trim();
        const msg = document.getElementById('waitlist-msg');
        if (!email || !email.includes('@')) {
            if (msg) msg.style.color = '#ef4444', msg.textContent = 'Please enter a valid email.';
            return;
        }
        if (window.firebaseModules && window._db) {
            try {
                const { addDoc, collection, serverTimestamp } = window.firebaseModules;
                await addDoc(collection(window._db, 'waitlist'), {
                    email,
                    createdAt: serverTimestamp()
                });
            } catch(e) { console.warn('waitlist save:', e.message); }
        }
        if (msg) {
            msg.style.color = '#10b981';
            msg.textContent = "You're on the list! We'll reach out when we launch.";
        }
        document.getElementById('waitlist-email').value = '';
    };
    </script>
