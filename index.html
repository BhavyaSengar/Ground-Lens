<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroundLens | Anti-Gravity Marketplace</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
      {
        "imports": {
          "motion": "https://esm.sh/motion"
        }
      }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // Expose Firebase to window for app.js to use
        window.firebaseModules = {
            initializeApp,
            getAuth,
            GoogleAuthProvider,
            signInWithPopup
        };
    </script>
</head>

<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="glass-nav"
            style="background: var(--nav-bg); border-bottom: 1px solid var(--glass-border-subtle); padding: 1.2rem 4rem;">
            <div class="logo" style="display: flex; align-items: center; gap: 0.8rem; cursor: pointer;">
                <div
                    style="background: var(--brand-cyan); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-inverse); font-size: 1.2rem; box-shadow: 0 0 15px var(--brand-cyan-glow);">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div style="font-weight: 700; font-size: 1.5rem; color: var(--text-main); letter-spacing: 0px;">
                    Ground<span style="color: var(--brand-purple);">Lens</span>
                </div>
            </div>

            <div class="nav-links" id="nav-links" style="display: flex; gap: 2.5rem; justify-content: center; flex: 1;">
                <!-- Links injected by JS -->
            </div>

            <div style="display:flex; align-items:center; gap: 1.5rem; justify-content: flex-end;" id="nav-actions">
                <button id="theme-toggle" class="btn-magnetic"
                    style="background:transparent; border:1px solid var(--glass-border-subtle); border-radius:50%; width: 40px; height: 40px; display:flex; align-items:center; justify-content:center; font-size: 1.1rem; color:var(--text-main); cursor: pointer; transition: all 0.3s ease;">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <div id="nav-profile" style="display:flex; align-items:center; gap: 1.5rem;">
                    <!-- Profile snippet or login actions injected by JS -->
                </div>
            </div>

        </nav>

        <main id="main-content" class="content-container slide-up-anim">
            <!-- Dynamic content swapped here by JS -->
        </main>

        <!-- Floating Notification System -->
        <div id="notification-container" class="notification-container"></div>
    </div>

    <!-- Templates -->
    <template id="tmpl-home">
        <div class="landing-page slide-up-anim" style="position: relative;">
            <!-- Futuristic Map Grid Background -->
            <div class="hero-grid-bg"></div>

            <div class="hero-section text-center"
                style="position: relative; max-width: 900px; margin: 0 auto; padding-top: 6rem; z-index: 1;">

                <div
                    style="position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; background: radial-gradient(circle, rgba(168,85,247,0.3) 0%, transparent 70%); filter: blur(40px); animation: pulseGlow 4s infinite alternate; z-index: -1;">
                </div>

                <h1 class="hero-title"
                    style="margin-bottom: 1.5rem; font-size: 4.5rem; font-weight: 800; letter-spacing: -2px; color: #ffffff; text-shadow: 0 2px 10px rgba(0,0,0,0.8), 0 0 15px rgba(168, 85, 247, 0.5);">
                    <span class="hero-word" style="display:inline-block; position: relative; z-index: 2;">See
                        anywhere,</span><br>
                    <span class="hero-word"
                        style="display:inline-block; position: relative; z-index: 2;">instantly.</span>
                </h1>
                <p class="hero-subtitle"
                    style="margin-bottom: 2.5rem; margin-left: auto; margin-right: auto; font-size: 1.25rem; color: var(--text-muted); max-width: 600px; line-height: 1.6;">
                    Request real-time photos and videos of any location through our trusted scout network.
                </p>
                <div class="hero-buttons" style="display:flex; justify-content:center; gap:1.5rem; flex-wrap: wrap;">
                    <button class="btn-primary ripple-button btn-magnetic role-btn" data-role="user"
                        style="padding:1.2rem 2.5rem; font-size:1.1rem; border-radius:12px; font-weight: 600; box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);">
                        Request Ground View
                    </button>
                    <button class="btn-magnetic ripple-button role-btn" data-role="doer"
                        style="padding:1.2rem 2.5rem; font-size:1.1rem; border-radius:12px; background:rgba(255,255,255,0.05); border: 1px solid var(--glass-border-strong); font-weight: 600; color: var(--text-main);">
                        Become a Scout
                    </button>
                </div>
            </div>

            <!-- Floating UI Card / Map -->
            <div class="hero-glass-map-card">
                <!-- Location Pins -->
                <div class="hero-pin" style="top: 35%; left: 40%; animation: pulseGlow 3s infinite 0s;"></div>
                <div class="hero-pin" style="top: 60%; left: 65%; animation: pulseGlow 3s infinite 0.5s;"></div>
                <div class="hero-pin" style="top: 45%; left: 80%; animation: pulseGlow 3s infinite 1.2s;"></div>
                <div class="hero-pin" style="top: 75%; left: 30%; animation: pulseGlow 3s infinite 0.8s;"></div>
                <div class="hero-pin" style="top: 25%; left: 55%; animation: pulseGlow 3s infinite 1.5s;"></div>

                <!-- Floating Task Snippet -->
                <div class="float-anim-fast shimmer-badge"
                    style="position: absolute; top: 40%; left: 45%; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--glass-border-strong); padding: 0.8rem; border-radius: 12px; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 0.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <div
                        style="width: 32px; height: 32px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem;">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                    <div>
                        <div style="font-size: 0.8rem; font-weight: 600; color: white;">Central Park Cafe</div>
                        <div style="font-size: 0.7rem; color: var(--text-muted);">Verified 2 mins ago</div>
                    </div>
                </div>
            </div>

            <!-- Stats Bar Section -->
            <div class="motion-section"
                style="max-width: 1000px; margin: 2rem auto 4rem; padding: 0 1rem; position: relative; z-index: 20;">
                <div class="glass-card"
                    style="background: rgba(10, 10, 10, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 2rem 0; display: flex; align-items: center; justify-content: space-around; backdrop-filter: blur(12px); box-shadow: 0 10px 40px rgba(0,0,0,0.8);">

                    <div style="flex: 1; text-align: center; border-right: 1px solid rgba(255, 255, 255, 0.05);">
                        <div style="color: #fbbf24; font-size: 1.1rem; margin-bottom: 0.8rem;"><i
                                class="fa-solid fa-circle-check"></i></div>
                        <div
                            style="color: #fbbf24; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -1px;">
                            12,400+</div>
                        <div style="color: var(--text-muted); font-size: 0.75rem; font-weight: 500;">Tasks Completed
                        </div>
                    </div>

                    <div style="flex: 1; text-align: center; border-right: 1px solid rgba(255, 255, 255, 0.05);">
                        <div style="color: #fbbf24; font-size: 1.1rem; margin-bottom: 0.8rem;"><i
                                class="fa-solid fa-users"></i></div>
                        <div
                            style="color: #fbbf24; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -1px;">
                            3,200+</div>
                        <div style="color: var(--text-muted); font-size: 0.75rem; font-weight: 500;">Active Doers</div>
                    </div>

                    <div style="flex: 1; text-align: center; border-right: 1px solid rgba(255, 255, 255, 0.05);">
                        <div style="color: #fbbf24; font-size: 1.1rem; margin-bottom: 0.8rem;"><i
                                class="fa-regular fa-star"></i></div>
                        <div
                            style="color: #fbbf24; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -1px;">
                            98%</div>
                        <div style="color: var(--text-muted); font-size: 0.75rem; font-weight: 500;">Satisfaction Rate
                        </div>
                    </div>

                    <div style="flex: 1; text-align: center;">
                        <div style="color: #fbbf24; font-size: 1.1rem; margin-bottom: 0.8rem;"><i
                                class="fa-regular fa-clock"></i></div>
                        <div
                            style="color: #fbbf24; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -1px;">
                            8 min</div>
                        <div style="color: var(--text-muted); font-size: 0.75rem; font-weight: 500;">Avg. Response Time
                        </div>
                    </div>

                </div>
            </div>

            <!-- New Problem Section -->
            <div class="motion-section"
                style="max-width: 1200px; margin: 4rem auto 0; padding: 0 1rem; position: relative; z-index: 10;">
                <div style="text-align: center; margin-bottom: 3rem;">
                    <div
                        style="display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.85rem; color: #f87171; margin-bottom: 1rem;">
                        <i class="fa-solid fa-triangle-exclamation"></i> The Problem
                    </div>
                    <h2 style="font-size: 2.5rem; font-weight: 700; color: var(--text-main);">Why GroundLens Exists</h2>
                </div>

                <div class="features-grid"
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">

                    <!-- Problem Card 1 -->
                    <div class="glass-card hover-lift"
                        style="background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); padding: 2.5rem 2rem; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <div
                            style="width: 64px; height: 64px; border-radius: 16px; background: rgba(99, 102, 241, 0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; box-shadow: 0 0 20px rgba(99, 102, 241, 0.2) inset;">
                            <i class="fa-solid fa-plane-slash"
                                style="font-size: 1.8rem; color: #818cf8; filter: drop-shadow(0 0 8px rgba(129, 140, 248, 0.5));"></i>
                        </div>
                        <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-main);">
                            Distance Barrier</h3>
                        <p style="color: var(--text-muted); line-height: 1.6; font-size: 0.95rem;">You need to check a
                            property or location in another city, but cannot justify the time or expense to travel there
                            yourself.</p>
                    </div>

                    <!-- Problem Card 2 -->
                    <div class="glass-card hover-lift"
                        style="background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); padding: 2.5rem 2rem; display: flex; flex-direction: column; align-items: center; text-align: center; animation-delay: 0.1s;">
                        <div
                            style="width: 64px; height: 64px; border-radius: 16px; background: rgba(56, 189, 248, 0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2) inset;">
                            <i class="fa-solid fa-clock-rotate-left"
                                style="font-size: 1.8rem; color: #38bdf8; filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.5));"></i>
                        </div>
                        <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-main);">
                            Outdated Data</h3>
                        <p style="color: var(--text-muted); line-height: 1.6; font-size: 0.95rem;">Street view maps and
                            listing photos are often months or years out of date. You want to verify real-time ground
                            reality today.</p>
                    </div>

                    <!-- Problem Card 3 -->
                    <div class="glass-card hover-lift"
                        style="background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); padding: 2.5rem 2rem; display: flex; flex-direction: column; align-items: center; text-align: center; animation-delay: 0.2s;">
                        <div
                            style="width: 64px; height: 64px; border-radius: 16px; background: rgba(244, 63, 94, 0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; box-shadow: 0 0 20px rgba(244, 63, 94, 0.2) inset;">
                            <i class="fa-solid fa-chart-line-down"
                                style="font-size: 1.8rem; color: #fb7185; filter: drop-shadow(0 0 8px rgba(251, 113, 133, 0.5));"></i>
                        </div>
                        <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-main);">
                            Decision Risk</h3>
                        <p style="color: var(--text-muted); line-height: 1.6; font-size: 0.95rem;">Making expensive
                            remote decisions—like buying real estate or verifying a shipment—without true visibility
                            creates massive financial risk.</p>
                    </div>

                </div>
            </div>

            <!-- New Solution Section -->
            <div class="motion-section"
                style="max-width: 1200px; margin: 8rem auto 4rem; padding: 0 1rem; position: relative;">

                <!-- Background Glow -->
                <div
                    style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 500px; background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%); z-index: -1; pointer-events: none; border-radius: 50%;">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;">

                    <!-- Left Column: Text Content -->
                    <div style="text-align: left;">
                        <div
                            style="display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.2); padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.85rem; color: #c084fc; margin-bottom: 1.5rem;">
                            <i class="fa-solid fa-lightbulb"></i> The Solution
                        </div>

                        <h2
                            style="font-size: 3rem; font-weight: 700; color: var(--text-main); line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -1px;">
                            GroundLens gives you eyes on the ground.
                        </h2>

                        <p
                            style="font-size: 1.15rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 2.5rem; max-width: 500px;">
                            Post a request, nearby scouts capture real-time visuals, and receive verified ground reality
                            within minutes.
                        </p>

                        <ul
                            style="list-style: none; padding: 0; margin: 0 0 2.5rem 0; display: flex; flex-direction: column; gap: 1rem;">
                            <li style="display: flex; align-items: flex-start; gap: 1rem;">
                                <div style="color: var(--brand-cyan); margin-top: 0.2rem;"><i
                                        class="fa-solid fa-circle-check"></i></div>
                                <div><strong style="color: var(--text-main); font-size: 1.05rem;">Instant
                                        Requests</strong>
                                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.2rem;">Drop a
                                        pin anywhere in the world.</p>
                                </div>
                            </li>
                            <li style="display: flex; align-items: flex-start; gap: 1rem;">
                                <div style="color: var(--brand-cyan); margin-top: 0.2rem;"><i
                                        class="fa-solid fa-circle-check"></i></div>
                                <div><strong style="color: var(--text-main); font-size: 1.05rem;">Trusted
                                        Network</strong>
                                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.2rem;">
                                        Thousands of verified scouts ready to act.</p>
                                </div>
                            </li>
                            <li style="display: flex; align-items: flex-start; gap: 1rem;">
                                <div style="color: var(--brand-cyan); margin-top: 0.2rem;"><i
                                        class="fa-solid fa-circle-check"></i></div>
                                <div><strong style="color: var(--text-main); font-size: 1.05rem;">GPS Secured</strong>
                                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.2rem;">
                                        Cryptographically verified time and location data.</p>
                                </div>
                            </li>
                        </ul>
                    </div>

                    <!-- Right Column: Animated Illustration -->
                    <div style="position: relative; width: 100%; height: 500px; padding: 2rem;">
                        <!-- Glass Mockup Frame -->
                        <div
                            style="position: absolute; inset: 0; background: rgba(15, 23, 42, 0.4); border: 1px solid var(--glass-border-strong); border-radius: 24px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(168, 85, 247, 0.1) inset; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); overflow: hidden; transform: perspective(1000px) rotateY(-5deg) rotateX(5deg); transition: transform 0.5s ease;">

                            <!-- Fake Map Layer -->
                            <div
                                style="position: absolute; inset: 0; background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px; opacity: 0.5;">
                            </div>

                            <!-- Animated Map Pins -->
                            <div class="float-anim"
                                style="position: absolute; top: 30%; left: 30%; width: 40px; height: 40px; background: rgba(168, 85, 247, 0.2); border: 2px solid var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); z-index: 2;">
                                <i class="fa-solid fa-location-dot" style="color: var(--primary-light);"></i>
                            </div>

                            <div class="float-anim-delayed"
                                style="position: absolute; top: 60%; left: 70%; width: 40px; height: 40px; background: rgba(56, 189, 248, 0.2); border: 2px solid var(--brand-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); z-index: 2;">
                                <i class="fa-solid fa-car" style="color: var(--brand-cyan);"></i>
                            </div>

                            <!-- Connecting Line -->
                            <svg
                                style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;">
                                <path d="M 180 150 Q 250 250 420 300" fill="transparent"
                                    stroke="rgba(168, 85, 247, 0.4)" stroke-width="2" stroke-dasharray="5,5">
                                    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" linear
                                        infinite />
                                </path>
                            </svg>

                            <!-- Fake Notification -->
                            <div class="slide-up-anim"
                                style="position: absolute; bottom: 30px; right: 30px; left: 30px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 1rem; border-radius: 12px; backdrop-filter: blur(8px); display: flex; align-items: center; gap: 1rem; z-index: 3; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
                                <div
                                    style="width: 40px; height: 40px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: white;">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <div style="flex: 1;">
                                    <div
                                        style="font-size: 0.9rem; font-weight: 600; color: white; margin-bottom: 0.2rem;">
                                        Photo Verified</div>
                                    <div style="font-size: 0.8rem; color: var(--text-muted);">Scout uploaded image in
                                        Seattle.</div>
                                </div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);">Just now</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- New Workflow Section -->
            <div id="how-it-works" class="motion-section"
                style="max-width: 1200px; margin: 8rem auto 6rem; padding: 0 1rem; position: relative; z-index: 10;">
                <div style="text-align: center; margin-bottom: 4rem;">
                    <p
                        style="font-size: 1.1rem; font-weight: 700; color: var(--brand-cyan); letter-spacing: 2px; margin-bottom: 1rem; text-transform: uppercase;">
                        How It Works</p>
                    <h2 style="font-size: 2.8rem; font-weight: 700; color: var(--text-main); line-height: 1.2;">
                        Four steps to ground truth.
                    </h2>
                </div>

                <div
                    style="position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start;">
                    <!-- Left: Sticky iPhone -->
                    <div
                        style="position: sticky; top: 15vh; display: flex; justify-content: center; transform: perspective(1000px) rotateY(-5deg) rotateX(5deg);">
                        <div
                            style="width: 300px; height: 600px; background: rgba(15, 23, 42, 0.8); border: 2px solid var(--glass-border-strong); border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05); padding: 12px; position: relative; overflow: hidden; backdrop-filter: blur(20px);">

                            <!-- Screen Content -->
                            <div id="iphone-screen"
                                style="width: 100%; height: 100%; border-radius: 30px; background: var(--bg-dark); position: relative; overflow: hidden;">
                                <div id="iphone-ui-1"
                                    style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), transparent); display: flex; align-items: center; justify-content: center; opacity: 1; transition: opacity 0.5s;">

                                        style="font-size: 4rem; color: var(--brand-cyan);"></i>
                                </div>
                                <div id="iphone-ui-2"
                                    style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), transparent); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s;">
                                    <i class="fa-solid fa-users-viewfinder"
                                        style="font-size: 4rem; color: var(--brand-purple);"></i>
                                </div>
                                <div id="iphone-ui-3"
                                    style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), transparent); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s;">
                                    <i class="fa-solid fa-camera-retro" style="font-size: 4rem; color: #ef4444;"></i>
                                </div>
                                <div id="iphone-ui-4"
                                    style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), transparent); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s;">
                                    <i class="fa-solid fa-circle-check"
                                        style="font-size: 4rem; color: var(--success);"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Scrolling Steps -->
                    <div style="display: flex; flex-direction: column; gap: 8rem; padding-bottom: 20vh; padding-top: 10vh;"

                            <input type="password" id="reg-confirm" value=""
                                style="width: 100%; box-sizing: border-box; background: var(--input-bg); border: 1px solid var(--glass-border-strong); color: var(--text-main); padding: 0.9rem 1.2rem; border-radius: 12px; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s;"
                                onfocus="this.style.borderColor='var(--brand-cyan)'"
                                onblur="this.style.borderColor='var(--glass-border-strong)'">
                            <i class="fa-regular fa-eye" onclick="window.togglePassword(this)"
                                style="position: absolute; right: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; z-index: 10;"></i>
                        </div>
                    </div>

                    <button id="register-submit-btn" type="submit" class="hover-lift"
                        style="width: 100%; background: var(--brand-cyan); color: var(--text-inverse); padding: 1.1rem; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: 600; cursor: pointer; box-shadow: 0 0 20px var(--brand-cyan-glow-subtle); margin-top: 1rem; transition: all 0.2s;">
                        Create Account
                    </button>

                    <div style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);">
                        Already have an account? <a href="#" onclick="renderView('loginForm'); return false;"
                            style="color: var(--brand-purple); text-decoration: none; font-weight: 600;">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </template>

    <!-- Full Dashboard Template (Post-Registration) -->
    <template id="tmpl-full-dashboard">
        <div class="dash-layout">
            <!-- Ambient Lighting -->
            <div class="ambient-glow ambient-cyan"></div>
            <div class="ambient-glow ambient-purple"></div>
            <div class="ambient-glow ambient-accent"></div>

            <!-- Sidebar -->
            <aside class="dash-sidebar">
                <div class="dash-sidebar-logo">
                    <div class="dash-sidebar-logo-icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>
                    <span style="color: var(--text-main);">Ground<span
                            class="dash-sidebar-logo-accent">Lens</span></span>
                </div>

                <nav class="dash-sidebar-nav">
                    <a href="#" class="dash-nav-item active" data-view="dashboard">
                        <i class="fa-solid fa-grid-2"></i> Dashboard
                    </a>
                    <a href="#" class="dash-nav-item" data-view="post-task">
                        <i class="fa-solid fa-plus"></i> Post Task
                    </a>
                    <a href="#" class="dash-nav-item" data-view="notifications">
                        <i class="fa-solid fa-bell"></i> Notifications
                        <span class="dash-nav-badge">0</span>
                    </a>
                    <a href="#" class="dash-nav-item" data-view="wallet">
                        <i class="fa-solid fa-wallet"></i> Wallet
                    </a>
                    <a href="#" class="dash-nav-item" data-view="analytics">
                        <i class="fa-solid fa-chart-line"></i> Analytics
                    </a>
                </nav>

                <div class="dash-sidebar-user">
                    <div class="dash-user-avatar" id="dash-avatar">U</div>
                    <div class="dash-user-info">
                        <span class="dash-user-name" id="dash-user-name">User</span>
                        <span class="dash-user-email" id="dash-user-email">user@email.com</span>
                    </div>
                </div>
                <a href="#" class="dash-nav-item dash-signout" id="dash-signout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
                </a>
            </aside>

            <!-- Main Content -->
            <div class="dash-main">
                <div id="dash-content" class="dash-content">
                    <!-- Dynamic sub-view content injected by JS -->
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="app.js"></script>
</body>

</html>
